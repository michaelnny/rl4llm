config:
  batch_size: 8
  checkpoint_interval: 100
  clip_grad_norm: 10.0
  eval_batch_size: 8
  eval_interval: 100
  gradient_accumulate_steps: 16
  max_sequence_length: 4000
  num_epochs: 5
job:
  artifacts_path: ./runs/coherent_classifier_qwen2.5_0.5b
  dataset:
    test_path: data/coherent_dataset/test.jsonl.gz
    train_path: data/coherent_dataset/train.jsonl.gz
  max_test_samples: 2048
  max_train_samples: 400000
  seed: 117
model:
  flash_attention: true
  gradient_checkpointing: true
  load_in_4bit: false
  pretrained_model: Qwen/Qwen2.5-0.5B-Instruct
optimizer:
  params:
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
    lr: 2.0e-05
    weight_decay: 0.0
  type: AdamW8bit
scheduler:
  params:
    final_lr_fraction: 0.1
    initial_lr_fraction: 0.1
    warmup_fraction: 0.1
  type: OneCycleLR
