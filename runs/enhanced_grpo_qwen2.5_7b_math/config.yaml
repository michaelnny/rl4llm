deepspeed_eval_config:
  bf16:
    enabled: true
  steps_per_print: 1000000
  train_batch_size: 128
  train_micro_batch_size_per_gpu: 8
deepspeed_train_config:
  activation_checkpointing:
    contiguous_memory_optimization: true
    cpu_checkpointing: true
    number_checkpoints: null
    partition_activations: true
    synchronize_checkpoint_boundary: false
  bf16:
    enabled: true
  gradient_clipping: 1.0
  optimizer:
    params:
      betas:
      - 0.9
      - 0.95
      eps: 1.0e-08
      lr: 5.0e-07
      weight_decay: 0.002
    type: Adam
  steps_per_print: 1000000
  train_batch_size: 128
  train_micro_batch_size_per_gpu: 8
  zero_optimization:
    allgather_partitions: true
    contiguous_gradients: true
    offload_optimizer:
      device: cpu
      pin_memory: false
    overlap_comm: true
    reduce_scatter: true
    stage: 2
grpo_config:
  checkpoint_interval: 50
  clip_eps: 0.2
  eval_batch_size: 32
  eval_interval: 50
  explore_decay_steps: 300
  explore_init_epsilon: 0.9
  explore_min_epsilon: 0.1
  explore_start_ratio: 0.05
  explore_top_k: 100
  explore_top_k_beta: 0.4
  gamma: 1.0
  group_size: 16
  group_temperature: true
  kl_loss_coef: 0.01
  max_new_tokens: 3000
  max_prompt_length: 1000
  max_steps: 1000
  min_completion_length: 100
  normalize_advantages: true
  normalize_group_rewards: true
  num_updates: 1
  rollout_size: 1024
  sync_reference_interval: 200
  system_prompt: 'Think about the reasoning process in your mind before give a final
    answer to the problem. Present your final answer within \\boxed{}.

    '
  temperature: 0.9
  top_k: 50
  top_p: 0.95
  xml_format: false
job:
  artifacts_path: ./runs/enhanced_grpo_qwen2.5_7b_math
  datasets:
  - math
  seed: 117
model:
  flash_attention: true
  gradient_checkpointing: true
  load_in_4bit: false
  pretrained_model: Qwen/Qwen2.5-7B-Instruct
