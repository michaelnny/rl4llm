grpo_config:
  batch_size: 8
  checkpoint_interval: 100
  clip_eps: 0.2
  eval_batch_size: 32
  eval_interval: 50
  gamma: 1.0
  gradient_accumulate_steps: 16
  group_size: 32
  kl_loss_coef: 0.001
  max_new_tokens: 1024
  max_steps: 1000
  min_completion_length: 100
  normalize_advantages: true
  normalize_group_rewards: true
  num_updates: 1
  rollout_size: 1024
  sync_reference_interval: 300
  system_prompt: 'Think about the reasoning process in your mind before give a final
    answer to the problem. Explore those "hmm", "aha" moments to reflect on your reasoning
    process. Present your final answer within \\boxed{}.

    '
  temperature: 0.9
  top_k: 50
  top_p: 1.0
  xml_format: false
job:
  artifacts_path: ./runs/standard_grpo_qwen2.5_0.5b_run
  datasets:
  - gsm
  max_test_samples: 2048
  seed: 117
model:
  flash_attention: true
  gradient_checkpointing: true
  load_in_4bit: false
  pretrained_model: Qwen/Qwen2.5-0.5B-Instruct
optimizer:
  params:
    betas:
    - 0.9
    - 0.95
    eps: 1.0e-08
    lr: 1.0e-06
    weight_decay: 0.002
  type: AdamW8bit
scheduler:
  params:
    final_lr_fraction: 0.1
    initial_lr_fraction: 0.1
    warmup_fraction: 0.02
  type: OneCycleLR
