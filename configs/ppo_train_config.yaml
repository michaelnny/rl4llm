# RL PPO config
job:
  name: "ppo_run_qwen2.5-1.5b"
  seed: 117
  artifacts_path: "./runs"

model:
  pretrained_model: "Qwen/Qwen2.5-1.5B-Instruct"
  # load_checkpoint: "./checkpoints/sft/checkpoint_step_100"
  load_in_4bit: false
  activation_checkpoint: true
  initialize_value_weights: true
  max_seq_len: 4096

training_config:
  rollout_iterations: 10000
  num_epochs: 4
  rollout_episodes: 1024
  gamma: 1.0 # default fixed discount factor
  dynamic_discount: false
  min_gamma: 0.9975 # for compute dynamic discount
  max_gamma: 0.9995 # for compute dynamic discount
  max_expected_length: 10000
  policy_clip_eps: 0.2 # PPO policy clip parameter
  value_clip_eps: 0.2 # PPO value clip parameter
  gae_lambda: 0.95
  normalize_advantages: true
  value_loss_coef: 0.1
  kl_loss_coef: 0.01
  checkpoint_enabled: true
  checkpoint_interval: 100 # every N updates
  checkpoint_keep_n: 5

datasets: # List of tasks/datasets to load
  - "gsm"
  # - "math"

environment:
  num_envs: 8
  min_reward: 0.0
  max_reward: 1.0
  mid_step_score: 0.5 # only used in multi-step MDP, where we assign a small reward for each non-terminal step
  shuffle: true
  state_config: # define state transition for MDP
    - state_id: reasoning
      system_prompt: |
        Think first about the reasoning process in your mind and then provides the user
        with the answer. Please put your final answer within $\boxed{}$.
      user_prompt: |
        {question}
      is_start: true
      should_grade: true
      transitions:
        - state_id: end_terminal
          terminal: true
          prob: 1.0

actor:
  decoding:
    max_new_tokens: 2048
    temperature: 0.6
    top_p: 1.0
    # top_k: 500
    do_sample: true

evaluator:
  enabled: true # Toggle to enable/disable evaluation
  interval: 20 # Perform evaluation every N iterations
  rollout_episodes: 500 # Maximum number of samples to test
  decoding:
    max_new_tokens: 2048
    temperature: 0.0
    top_p: 1.0
    # top_k: 500
    do_sample: false

deepspeed:
  # memory_breakdown: true  # for debugging
  steps_per_print: 10000 # disable default logging
  train_micro_batch_size_per_gpu: 4
  train_batch_size: 120
  gradient_clipping: 1.0
  prescale_gradients: false
  wall_clock_breakdown: false
  bf16:
    enabled: true
  optimizer:
    type: Adam
    params:
      lr: 1.0e-5 # this is just a place holder as it will be controlled by the scheduler
      betas: [0.9, 0.999]
      eps: 1.0e-8
      weight_decay: 0.0
  scheduler:
    type: "WarmupDecayLR"
    params:
      warmup_num_steps: 100
      total_num_steps: 50000
      warmup_min_lr: [1.0e-7, 1.0e-7, 1.0e-6] # for params groups *in order*: ["policy nodecay", "policy", "value head"]
      warmup_max_lr: [5.0e-6, 5.0e-6, 1.0e-5] # for params groups *in order*: ["policy nodecay", "policy", "value head"]
  zero_optimization:
    stage: 2
    contiguous_gradients: true
    allgather_partitions: true
    reduce_scatter: true
    overlap_comm: true
    reduce_bucket_size: 5.0e+5
    allgather_bucket_size: 5.0e+5
    # stage3_max_live_parameters: auto
    # stage3_max_reuse_distance: auto
    # stage3_param_persistence_threshold: auto
    # stage3_prefetch_bucket_size: auto
    # reduce_bucket_size: auto
    # memory_efficient_linear: false
    # ZeRO++
    # zero_hpz_partition_size: 8
    # zero_quantized_weights: false
    # zero_quantized_gradients: false
    # offload_param:
    #   device: cpu
    # offload_optimizer:
    #   device: cpu
    #   pin_memory: true
  # activation_checkpointing:
  #   partition_activations: true
  #   cpu_checkpointing: true
  #   contiguous_memory_optimization: true
  #   number_checkpoints: null
  #   synchronize_checkpoint_boundary: false
  #   profile: false

logging:
  level: "INFO"
  intervals:
    actor: 10 # log episode stats
    evaluator: 10 # log episode stats
    learner: 1 # log training step stats
