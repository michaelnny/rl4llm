# RL GRPO config
job:
  seed: 117
  artifacts_path: "./runs/discount_explore_grpo_qwen2.5_1.5b_gsm8k"
  datasets: # List of math datasets to load
    - "gsm"
    # - "math"
  max_train_samples: 8000         # for a quick run
  max_test_samples: 512        

model:
  pretrained_model: "Qwen/Qwen2.5-1.5B-Instruct"
  load_in_4bit: false
  gradient_checkpointing: true
  flash_attention: true

grpo_config:
  max_steps: 500
  rollout_size: 1024
  num_updates: 3
  batch_size: 4
  gradient_accumulate_steps: 16
  dynamic_discount: true            # compute dynamic discount based on completion length
  min_gamma: 0.999                  # for compute dynamic discount
  max_gamma: 0.9997                 # for compute dynamic discount
  max_completion_length: 1000       # for compute dynamic discount
  # gamma: 1.0                          # fixed discount
  clip_eps: 0.2                       # PPO policy clip parameter
  normalize_group_rewards: true       
  normalize_advantages: false
  kl_loss_coef: 0.01
  clip_grad_norm: 1.0
  sync_reference_interval: 300        # every N iteration

  # for sample generation
  max_prompt_length: 600              # skip sample question that's too long
  xml_format: false                   # check for R1 style XML format
  system_prompt: |
    Think about the reasoning process in your mind before give a final answer to the problem. Present your final answer within \\boxed{}.
  # system_prompt: |
  #   Think about the reasoning process in your mind before give a final answer to the problem. The reasoning process and answer are enclosed within <think> </think> and <answer> </answer> tags, respectively. Present your final answer within \\boxed{}.

  max_new_tokens: 1200
  temperature: 0.9
  # top_p: 1.0
  # top_k: 0
  group_size: 16                      # for each sample we generate a group of answers
  # # group temperature where some are more 'exploitive'
  group_temperature: true
  # random start exploration
  explore_init_epsilon: 0.9
  explore_min_epsilon: 0.1
  explore_decay_steps: 200
  explore_start_ratio: 0.1
  explore_top_k: 100
  explore_noise: 0.25             

  # evaluation
  eval_batch_size: 32
  eval_interval: 50

  # others
  checkpoint_interval: 100            # every N iteration

optimizer:
  type: AdamW8bit
  params:
    lr: 9.0e-7
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.0

