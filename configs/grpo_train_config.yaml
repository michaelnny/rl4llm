# RL GRPO config
model:
  pretrained_model: "Qwen/Qwen2.5-1.5B-Instruct"
  load_in_4bit: false
  activation_checkpoint: true

datasets: # List of math datasets to load
  - "gsm"
  # - "math"

grpo_config:
  artifacts_path: "./runs/second_run_explore_grpo_qwen2.5-1.5b"
  seed: 117
  max_iterations: 5000
  rollout_size: 1024
  num_updates: 1
  batch_size: 4
  gradient_accumulate_steps: 16
  gamma: 1.0      # no discount
  clip_eps: 0.2   # PPO policy clip parameter
  normalize_group_rewards: true
  group_size: 8   # GRPO specific
  kl_loss_coef: 0.04
  sync_reference_interval: 100

  # for sample generation
  system_prompt: |
    Think first about the reasoning process in your mind and then provides the user with the answer
  max_new_tokens: 1024
  temperature: 0.9
  do_sample: true
  # our enhancements
  group_temperature: true
  explore_init_epsilon: 0.9
  explore_min_epsilon: 0.1
  explore_decay_steps: 2000
  random_start_steps: 5
  random_start_top_k: 50

  # others
  checkpoint_interval: 100 # every N updates

optimizer:
  type: AdamW8bit
  params:
    lr: 1.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.002

scheduler:
  type: "OneCycleLR"
  params:
    warmup_fraction: 0.01 # 0.1
    initial_lr_fraction: 0.1
    final_lr_fraction: 0.1
