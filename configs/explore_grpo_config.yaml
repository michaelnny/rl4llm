# RL GRPO config
job:
  seed: 117
  artifacts_path: "./runs/explore_swap_grpo_qwen2.5_1.5b_gsm2k"
  datasets: # List of math datasets to load
    - "gsm"
    # - "math"
  max_train_samples: 2048         # for a quick run
  max_test_samples: 512        

model:
  pretrained_model: "Qwen/Qwen2.5-1.5B-Instruct"
  load_in_4bit: false
  gradient_checkpointing: true
  flash_attention: true

grpo_config:
  max_steps: 200
  rollout_size: 512
  num_updates: 1
  batch_size: 4
  gradient_accumulate_steps: 16
  # dynamic_discount: true            # compute dynamic discount based on completion length
  # min_gamma: 0.999                  # for compute dynamic discount
  # max_gamma: 0.9997                 # for compute dynamic discount
  # max_completion_length: 1000       # for compute dynamic discount
  gamma: 1.0                          # fixed discount
  clip_eps: 0.2                       # PPO policy clip parameter
  normalize_group_rewards: true       
  normalize_advantages: false
  kl_loss_coef: 0.01
  clip_grad_norm: 0.0
  sync_reference_interval: 128        # every N iteration

  # for sample generation
  max_prompt_length: 500              # skip sample question that's too long
  group_size: 16                      # for each sample we generate a group of answers
  xml_format: true                    # check for R1 style XML format
  system_prompt: |
    A conversation between User and Assistant. The user asks a question, and the Assistant solves it.  
    The Assistant first thinks about the reasoning process internally and then provides the user with the answer.  
    The reasoning process and answer are enclosed within `<think> </think>` and `<answer> </answer>` tags, respectively. i.e.,  
    `<think> Unstructured, free-form reasoning process exploring the problem in depth </think>`  
    `<answer> A clear and concise high-level summary of the solution and final answer </answer>`
  max_new_tokens: 1000
  temperature: 0.7                    # not used if using group_temperature
  repetition_penalty: 1.0
  top_p: 0.95
  top_k: 0
  
  group_temperature: false             # group temperature where we balance exploration and exploitation
  min_temperature: 0.6
  max_temperature: 0.9
  explore_init_epsilon: 0.9           # exploration epsilon decay
  explore_min_epsilon: 0.0
  explore_decay_steps: 100
  explore_start_steps: 0              # initial start steps to do random sampling
  explore_top_k: 30                   # Top K tokens to random sample during initial start steps
  explore_max_replacements: 3         # max number of replacements to the same sequence

  # evaluation
  eval_batch_size: 64
  eval_interval: 25

  # others
  checkpoint_interval: 100            # every N iteration

optimizer:
  type: AdamW8bit
  params:
    lr: 1.0e-6
    betas: [0.9, 0.999]
    eps: 1.0e-8
    weight_decay: 0.0

