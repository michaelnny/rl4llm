# RL extended GRPO config
seed: 117

logging:
  output_dir: "./runs/test_extended_grpo_qwen2.5_0.5b_gsm8k"  # where to save all artifacts (tensorboard events, samples, checkpoints)
  enable_tensorboard: true
  sample_buffer_size: 100               # how often to save samples to external files
  sample_file_format: 'jsonl'           # external file type, support 'jsonl', 'jsonl.gz', 'parquet'
  log_level: 20
  # metrics_aggregation_config:         # define custom metics aggregation methods
  #   accuracy_reward: ['mean', 'std', 'min', 'max']

dataset: 
  names:                                # List of math datasets to load
    - "gsm"
    # - "math"
  # max_train_samples: 4096             # for a quick run
  # max_test_samples: 1024        

model:
  pretrained_model: "Qwen/Qwen2.5-0.5B"
  load_in_4bit: false
  gradient_checkpointing: true
  flash_attention: true
  model_max_length: 4000

grpo:
  max_steps: 200
  train_rollout_size: 512
  num_updates: 1
  train_micro_batch_size: 4
  train_batch_size: 128                       
  gamma_min: 0.998                      # discount bounds
  gamma_max: 0.9998                     
  clip_eps_max: 0.3                     # PPO-style policy clip eps bounds
  clip_eps_min: 0.1                     
  group_reward_zero_mean: false         # group reward is normalized to have a zero mean without standard deviation scaling
  normalize_advantages: false
  kl_loss_coef: 0.0
  entropy_loss_coef: 0.001
  sync_reference_interval: 0            # every N global steps

  # for train rollout
  max_prompt_tokens: 512                # skip sample question that's too long
  group_size: 16                        # for each sample we generate a group of answers
  max_completion_tokens: 1024
  temperature: 0.9                      # not used
  repetition_penalty: 1.0               # not used
  top_p: 0.95
  top_k: -1                             # -1 to disable

  # evaluation
  eval_rollout_size: 512    
  eval_batch_size: 64
  eval_interval: 20                     # every N global steps

  # others
  checkpoint_interval: 100              # every N global steps

  filter_low_reward_std: false          # filter out group samples with near identical rewards

  # exploration generation
  min_top_p: 0.9
  max_top_p: 1.0
  min_temperature: 0.6
  max_temperature: 1.0

  # control rate of explore
  explore_eps_max: 0.9                 # exploration epsilon decay
  explore_eps_min: 0.0
  explore_percentage: 0.3                   # percentage of total training steps

  # exploring start
  random_start_steps: 0                     # initial start steps to do random sampling
  random_start_top_k: 0                    # Top K tokens to random sample during initial start steps
  
  # continue generation with token replacement
  replace_top_k: 0
  replace_prob: 0.0
  replace_max_count: 0                 # max number of retry by adding the special token and continue generation


deepspeed:
  # memory_breakdown: true              # for debugging
  steps_per_print: 1000000              # disable default logging
  # train_micro_batch_size_per_gpu: 1      
  # train_batch_size: 1                    
  gradient_clipping: 0.0
  bf16:
    enabled: true
  optimizer:
    type: AdamW
    params:
      lr: 1.0e-6                   
      betas: [0.9, 0.999]
      eps: 1.0e-8
      weight_decay: 0.0
  # scheduler:
  #   type: "WarmupDecayLR"
  #   params:
  #     warmup_num_steps: 200
  #     total_num_steps: 10000
  #     warmup_min_lr: 1.0e-8
  #     warmup_max_lr: 9.0e-7
  zero_optimization:
    stage: 3
    contiguous_gradients: true
    overlap_comm: true
    allgather_partitions: true
    reduce_scatter: true
    # offload_param:
    #   device: cpu
    #   pin_memory: false
    offload_optimizer:
      device: cpu
      pin_memory: false
  activation_checkpointing:
    partition_activations: true
    cpu_checkpointing: true
    contiguous_memory_optimization: true
    number_checkpoints: null
    synchronize_checkpoint_boundary: false


# Optional, for reference model deepspeed configuration
reference_deepspeed:
  steps_per_print: 1000000               # disable default logging
  train_micro_batch_size_per_gpu: 1      # not used but required
  train_batch_size: 1                    # not used but required
  gradient_clipping: 0.0
  bf16:
    enabled: true
  zero_optimization:
    stage: 3
    contiguous_gradients: false
    overlap_comm: true
    allgather_partitions: true
    reduce_scatter: true
    offload_param:
      device: cpu
      pin_memory: false
